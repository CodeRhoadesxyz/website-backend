<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Database Tools · Heart & Soul Parrot Rescue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/admin/styles.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">Restricted Area</div>
      <h1>Database Tools</h1>
      <p style="color:var(--muted); font-size:0.9rem; margin-top:0.25rem;">This area is only accessible to the site owner.</p>

      <form id="login-form">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required />

        <div class="error-text" id="error-text"></div>

        <button type="submit" class="btn-primary" style="width:100%; margin-top:0.75rem;">Sign in</button>
      </form>
      <p style="margin-top:1.25rem;"><a href="/admin/login.html" style="font-size:0.85rem;">← Back to the regular admin panel</a></p>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const form = document.getElementById('login-form');
    const errorText = document.getElementById('error-text');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorText.textContent = '';
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorText.textContent = data.error || 'Sign in failed.';
          return;
        }

        // Login succeeded, but that alone doesn't mean this account is
        // allowed in here — check against the real permission gate before
        // redirecting, so an ordinary admin gets a clear message instead of
        // a page full of confusing 403 errors.
        const checkRes = await fetch(`${API_BASE}/api/db-admin/tables`, { credentials: 'include' });
        if (!checkRes.ok) {
          const checkData = await checkRes.json().catch(() => ({}));
          errorText.textContent = checkData.error || 'This area is restricted to the site owner.';
          return;
        }

        window.location.href = './index.html';
      } catch (err) {
        errorText.textContent = 'Could not reach the server. Try again shortly.';
      }
    });
  </script>
</body>
</html>
