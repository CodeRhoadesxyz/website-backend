<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Reset password · Heart & Soul Parrot Rescue Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <div class="eyebrow">Admin Portal</div>
      <h1>Reset password</h1>

      <form id="reset-form">
        <label for="password">New password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" minlength="8" required />

        <label for="confirm">Confirm new password</label>
        <input id="confirm" name="confirm" type="password" autocomplete="new-password" minlength="8" required />

        <div class="error-text" id="error-text"></div>

        <button type="submit" class="btn-primary" style="width:100%; margin-top:0.75rem;">Set new password</button>
      </form>

      <div id="success-panel" style="display:none;">
        <p style="color:var(--muted); font-size:0.9rem;">Your password has been reset.</p>
        <a href="./login.html" class="btn-primary" style="display:block; text-align:center; width:100%; margin-top:0.5rem;">Sign in</a>
      </div>

      <div id="missing-token-panel" style="display:none;">
        <p class="error-text">This reset link is missing its token. Please use the link from your email, or request a new one from the sign-in page.</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const form = document.getElementById('reset-form');
    const errorText = document.getElementById('error-text');
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      form.style.display = 'none';
      document.getElementById('missing-token-panel').style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorText.textContent = '';
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      if (password !== confirm) {
        errorText.textContent = 'Passwords do not match.';
        return;
      }

      try {
        const res = await fetch(`${API_BASE}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          errorText.textContent = data.error || 'Could not reset password.';
          return;
        }
        form.style.display = 'none';
        document.getElementById('success-panel').style.display = 'block';
      } catch (err) {
        errorText.textContent = 'Could not reach the server. Try again shortly.';
      }
    });
  </script>
</body>
</html>
