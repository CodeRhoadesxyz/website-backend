<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard · Heart & Soul Parrot Rescue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@500;600&family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="shell">
    <div class="sidebar">
      <div class="brand">Heart &amp; Soul<br />Admin</div>
      <a href="/" class="nav-tab" id="back-home-link">← Back to website</a>
      <div class="nav-tab active" data-tab="home">Home</div>
      <div class="nav-tab" data-tab="adoption">Adoption applications</div>
      <div class="nav-tab" data-tab="relinquishment">Relinquishment applications</div>
      <div class="nav-tab" data-tab="volunteer">Volunteer applications</div>
      <div class="nav-tab" data-tab="birds">Adoptable birds</div>
      <div class="nav-tab" data-tab="fosters">Fosters</div>
      <div class="nav-tab" data-tab="events">Events</div>
      <div class="nav-tab" data-tab="announcements">News announcements</div>
      <div class="nav-tab" data-tab="wishlist">Wishlist</div>
      <div class="nav-tab" data-tab="testimonials">Testimonials</div>
      <div class="nav-tab" data-tab="faqs">FAQs</div>
      <div class="nav-tab" data-tab="store">Store</div>
      <div class="nav-tab" data-tab="community">Community</div>
      <div class="nav-tab" data-tab="admins">Admin access</div>
      <div class="spacer"></div>
      <div class="nav-tab" id="logout-btn">Sign out</div>
    </div>

    <div class="main">
      <div class="topbar">
        <h2 id="view-title">Home</h2>
        <span class="mono" id="signed-in-as" style="color:var(--muted); font-size:0.85rem;"></span>
      </div>

      <div id="home-view"></div>
      <div id="app-view" style="display:none;"></div>
      <div id="events-view" style="display:none;"></div>
      <div id="announcements-view" style="display:none;"></div>
      <div id="birds-view" style="display:none;"></div>
      <div id="community-view" style="display:none;"></div>
      <div id="admins-view" style="display:none;"></div>
      <div id="fosters-view" style="display:none;"></div>
      <div id="wishlist-view" style="display:none;"></div>
      <div id="testimonials-view" style="display:none;"></div>
      <div id="faqs-view" style="display:none;"></div>
      <div id="store-view" style="display:none;"></div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-root"></div>

  <script src="app.js"></script>
</body>
</html>
